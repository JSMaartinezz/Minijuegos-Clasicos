<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahorca-2</title>
    <link rel="stylesheet" href="ahorca2.css">
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single+Ink:wght@100..900&family=Fredoka:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body> 
    <div class="estructura-central">
        <div class="cantidad-vidas">
            <p class="vidas">♥️♥️♥️♥️♥️♥️</p>
            <button class="sacrificio">Sacrifica una vida</button>
        </div>
        <div class="centro-juego">
            <div class="activar-juego">
                <button class="generar-palabra">¡Que comience el juego!</button>
            </div>
            <div class="figura">
                <div class="cuerda-figura"></div>
                <div class="parte-derecha-figura"></div>
                <div class="parte-angulo"></div>
                <div class="parte-central-figura"></div>
                <div class="parte-abajo-figura"></div>
                <div class="cuerpo">
                    <div class="cabeza"></div> 
                    <div class="brazo-izq"></div> 
                    <div class="brazo-der"></div> 
                    <div class="tronco"></div> 
                    <div class="pierna-izq"></div> 
                    <div class="pierna-der"></div>
                </div>
            </div>
        </div>                       
        <div class="conjunto-input">           
            <div class="input-letra">
                <input class="adivinar-letra" type="text">
                <button class="letras">Añadir letra</button>
            </div>
            <div class="input-palabra">
                <input class= "adivinar-palabra" type="text">
                <button class="palabra">Adivinar palabra</button>
            </div>
        </div>
    </div>
    <div class="estructura-footer">
        <div class="hueco-letras"></div>
        <div class="letras-usadas"></div>
    </div>
    <script src="ahorca2.js"></script>
</body>
</html>
