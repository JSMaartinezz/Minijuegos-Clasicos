<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minijuegos Clásicos</title>
    <link rel="stylesheet" href="menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single+Ink:wght@100..900&family=Fredoka:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <div class="padre">
        
        <div class="MensajeBienvenida">
            <h1>¡Bienvenido!</h1>
            <p>¿Qué te apetece jugar hoy?</p>
        </div>

        <div class="estructuraCentral">
            <div class="menuEleccion">
                <div class="pantallaMenu">
                    <button class="AdivinaNumero">¡Juega a <strong>Adivina el número!</strong></button>
                    <button class="PPT">¡Juega a <strong>Piedra, Papel o Tijeras!</strong></button>
                </div>
                <div class="detalles-tele">
                    <div class="parte-inferior-detalles-tele">
                        <div class="rectangulo-izq">
                            <div class="boton-rectangulo-1"></div>
                            <div class="boton-rectangulo-2"></div>
                            <div class="boton-rectangulo-3"></div>
                            <div class="boton-rectangulo-4"></div>
                        </div>
                        <div class="mando-tele">
                            <div class="mando-1">
                                <div class="eje-mando-1"></div>
                            </div>
                            <div class="mando-2">
                                <div class="eje-mando-2"></div>
                            </div>
                        </div>
                    </div>
                    <div class="rejilla-tele"></div>
                </div>
            </div>
            <div class="juegoTarjeta">
                <h3 class="tituloTarjeta"></h3>
                <img class="imagenTarjeta" src="" alt="" width="100%">
                <p class="descripcionTarjeta"></p>
                <button class="botonTarjeta"></button>
            </div>
        </div>
    </div>
    <script src="menu.js"></script>
</body>
</html>
